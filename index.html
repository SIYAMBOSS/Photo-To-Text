<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StreamHub | Exclusive Premium Content</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onclick="handleGlobalClick()">

    <div id="verify-popup" class="premium-overlay">
        <div class="glass-box">
            <div class="header-icon">🛡️</div>
            <h2>SECURITY CHECK</h2>
            <p class="sub-text">এই ভিডিওটি দেখতে হলে নিচের সিকিউরিটি ভেরিফিকেশন সম্পন্ন করুন।</p>
            <div class="step-container">
                <div class="step active"><span class="step-num">1</span> Server Connected</div>
                <div class="step" id="step-2"><span class="step-num">2</span> Human Verification</div>
            </div>
            <button id="main-verify-btn" class="glow-button">CONTINUE TO VIDEO</button>
        </div>
    </div>

    <div class="app-shell">
        <div class="main-player">
            <div class="live-tag">● LIVE</div>
            <div class="video-overlay">
                <div class="play-trigger">▶</div>
                <p>Click to start streaming</p>
            </div>
        </div>

        <div class="video-details">
            <h2>VIRAL: Private_Full_HD_Video_2026.mp4</h2>
            <div class="meta">1.4M Views • 45m ago</div>
        </div>

        <hr class="divider">

        <div class="recommendations">
            <h3>More Viral Videos</h3>
            <div id="video-grid-container" class="video-grid">
                </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
