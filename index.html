<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch Premium Video | HD Stream</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="ad-layer" onclick="handleAdClick()"></div>

    <div class="player-wrapper">
        <div class="header">
            <span>🔴 LIVE - 1.2k Watching</span>
        </div>
        
        <div class="fake-player">
            <div class="play-overlay">
                <div class="play-icon">▶</div>
                <p>Click to start streaming</p>
            </div>
            
            <div class="bottom-controls">
                <div class="progress-bar"></div>
                <div class="icons">
                    <span>🔇</span>
                    <span>⚙️</span>
                    <span>⛶</span>
                </div>
            </div>
        </div>

        <div class="video-info">
            <h2>VIRAL: Private Video 2026.mp4</h2>
            <div class="stats">
                <span>Views: 845,921</span>
                <span>Date: 2 hours ago</span>
            </div>
        </div>
    </div>

    <div id="verify-modal" class="modal">
        <div class="modal-box">
            <h3>Human Verification</h3>
            <p>You must click "Play" to verify you are not a robot.</p>
            <button onclick="handleAdClick()">START STREAMING</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
